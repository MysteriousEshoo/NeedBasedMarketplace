name: need_marketplace
description: A premium need-based marketplace app for Pakistan.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  
  # Firebase Core (Required for all Firebase services)
  firebase_core: ^3.3.0
  
  # Firebase Authentication (Login ke liye)
  firebase_auth: ^5.1.0
  
  # Firebase Realtime Database (Data save karne ke liye)
  firebase_database: ^11.1.0
  
  # Cloud Firestore (Alternative database - optional)
  cloud_firestore: ^5.2.0
  
  # Image Picker (Profile picture ke liye)
  image_picker: ^1.2.2
  
  # ✨ NEW DEPENDENCIES - ADD THESE:
  
  # State Management (Theme toggle ke liye)
  provider: ^6.1.2
  
  # Local Storage (Theme preference save karne ke liye)
  shared_preferences: ^2.3.5
  
  # URL Launcher (Help screen mein phone/email/whatsapp open karne ke liye)
  url_launcher: ^6.3.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true