name: need_marketplace
description: A premium need-based marketplace app for Pakistan.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  # Firebase Core (Required for all Firebase services)
  firebase_core: ^3.3.0
  # Firebase Authentication (Login ke liye)
  firebase_database: ^11.1.0
  firebase_auth: ^5.1.0
  # Cloud Firestore (Data save karne ke liye)
  cloud_firestore: ^5.2.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
